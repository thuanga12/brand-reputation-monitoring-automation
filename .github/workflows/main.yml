name: Project-CI-Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Check Backend
        run: |
          if [ -d "backend" ]; then
            cd backend && npm install --package-lock-only || echo "No package.json yet"
          fi

      - name: Check Frontend
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm install --package-lock-only || echo "No package.json yet"
          fi
